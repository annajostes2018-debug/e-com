<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="x-ua-compatible" content="ie=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Anna Grun — Portfolio</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://kit.fontawesome.com/05458313d2.js" crossorigin="anonymous"></script>
  </head>
  <body>
    <header class="nav">
      <div class="personal__logo">Anna Grun</div>
      <nav>
        <ul class="nav__link--list">
          <li><a href="#about" class="nav__link--anchor">About</a></li>
          <li><a href="#projects" class="nav__link--anchor">Projects</a></li>
          <li><a href="#contact" class="nav__link--anchor nav__link--anchor-primary">Contact</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section id="about" class="hero">
        <div class="row about-me__info--container">
          <img
            class="about-me__picture--mask"
            src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=800&q=80&auto=format&fit=crop"
            alt="Portrait"
          />
          <h1>
            Hey! I'm <span class="text--purple">Anna Grun</span>
          </h1>
          <p class="lead">Frontend Software Engineer — building beautiful, accessible interfaces.</p>
          <div class="social">
            <a href="#" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
            <a href="#" aria-label="GitHub"><i class="fab fa-github"></i></a>
            <a href="mailto:anna@example.com" aria-label="Email"><i class="fas fa-envelope"></i></a>
            <a href="#" aria-label="Resume"><i class="fas fa-file-pdf"></i></a>
          </div>
        </div>
      </section>

      <section id="projects" class="section">
        <div class="row">
          <h2>Projects</h2>
          <p>Featured work will go here. Add project cards with links.</p>
        </div>
      </section>

      <section id="contact" class="section">
        <div class="row">
          <h2>Contact</h2>
          <p>Want to work together? <a href="mailto:anna@example.com">Send an email</a>.</p>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="row">© 2026 Anna Grun</div>
    </footer>
  </body>
</html>
